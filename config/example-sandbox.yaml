# SendBox Configuration Example
# ─────────────────────────────────────────────────────────────────────────────
# This file configures a sandbox for running an AI agent on a project.
# Copy this file and customize it for your project:
#
#   cp config/example-sandbox.yaml my-sandbox.yaml
#   sendbox run --config my-sandbox.yaml
#
# All paths are relative to where `sendbox` is invoked unless absolute.
# ─────────────────────────────────────────────────────────────────────────────

# A human-readable name for this sandbox instance.
# Used in logs, the dashboard, and container labels.
# Must be unique across running sandboxes on the same host.
name: my-project-sandbox

# ─────────────────────────────────────────────────────────────────────────────
# Project
# ─────────────────────────────────────────────────────────────────────────────
# Absolute or relative path to the project root.
# This directory is mounted read/write into the sandbox container.
# The agent can read, modify, and create files within this tree.
project_path: /Users/developer/my-project

# ─────────────────────────────────────────────────────────────────────────────
# Runtime Provider
# ─────────────────────────────────────────────────────────────────────────────
# "auto" selects Apple Containerization on supported macOS hosts and Kata
# Containers on Linux. Override it with `sendbox run --runtime apple|kata`.
runtime:
  provider: auto

  # Used only when provider is "kata".
  kata:
    executable: nerdctl
    runtime_handler: io.containerd.kata.v2
    namespace: sendbox
    # address: /run/containerd/containerd.sock
    # snapshotter: overlayfs
    # configuration_path: /etc/kata-containers/configuration.toml

# ─────────────────────────────────────────────────────────────────────────────
# Container Resources
# ─────────────────────────────────────────────────────────────────────────────
# Resource limits for the sandbox container. These are hard caps — the
# container cannot exceed them. Set them based on your project's needs:
#
#   Small project (linting, tests):     cpus: 2, memory_mb: 2048
#   Medium project (builds, bundling):  cpus: 4, memory_mb: 4096
#   Large project (compilation, ML):    cpus: 8, memory_mb: 8192
resources:
  # Number of CPU cores allocated to the container.
  # Fractional values are supported (e.g., 1.5).
  # Default: 4
  cpus: 4

  # Memory limit in megabytes.
  # The container is killed (OOM) if it exceeds this limit.
  # Default: 4096
  memory_mb: 4096

  # Disk space limit in megabytes for the container's writable layer.
  # Does not include the project mount (which uses the host filesystem).
  # Default: 10240
  disk_size_mb: 10240

# ─────────────────────────────────────────────────────────────────────────────
# Security Policy
# ─────────────────────────────────────────────────────────────────────────────
# Controls what the agent can do inside the sandbox.
# You can define the policy inline (as shown below) or reference an
# external policy file for reuse across multiple sandboxes.
#
# To use an external policy file instead of inline rules:
#   policy:
#     file: ./config/default-policy.yaml
#
# When both `file` and inline rules are present, inline rules are merged
# on top of the file — allowing you to extend or override specific parts.
policy:
  # ── Command execution ──────────────────────────────────────────────────
  commands:
    # "deny" blocks any command not in the allowlist.
    # "allow" permits all commands except those in the denylist.
    # Recommended: "deny" for untrusted agents, "allow" for trusted local use.
    default_action: deny

    # Log every blocked command to the sandbox audit log.
    # Helpful for building your allowlist iteratively.
    log_blocked: true

    # Commands the agent may execute (glob patterns).
    allowlist:
      - "git *"
      - "npm *"
      - "node *"
      - "python3 *"
      - "make *"
      - "cat *"
      - "ls *"
      - "grep *"
      - "curl *"

    # Commands that are always blocked, even if they match the allowlist.
    # Use specific patterns to block dangerous invocations of otherwise
    # safe commands (e.g., "rm -rf /*" but not "rm -rf ./build").
    denylist:
      - "sudo *"
      - "rm -rf /*"

  # ── Kernel and MCP boundaries ─────────────────────────────────────────────
  boundaries:
    # Fail closed if eBPF, Python, the compiler, or libseccomp is unavailable.
    enabled: true

    tool_calls:
      # Secure enforcement currently supports newline-framed stdio MCP only.
      # Prefix each configured server command with:
      #   /run/sendbox-boundary/mcp-proxy --
      transport: stdio
      default_action: deny
      allowlist:
        - read_file
        - list_directory
        - search_code
      denylist:
        - "*delete*"
        - "*shell*"
      max_frame_bytes: 1048576
      server_command_patterns:
        - mcp-server
        - "@modelcontextprotocol"
      allowed_server_commands:
        - ["/usr/local/bin/node", "/usr/local/lib/node_modules/@modelcontextprotocol/server-filesystem/dist/index.js", "/workspaces/my-project"]

    syscalls:
      # These extend the built-in ContainerHardening seccomp denylist.
      additional_denylist:
        - io_uring_setup
        - io_uring_register
      log_blocked: true

    log_path: /var/log/sendbox/boundary.log

  # ── Network / Firewall ─────────────────────────────────────────────────
  network:
    # "deny" blocks all outbound connections except to allowed_domains.
    # "allow" permits all outbound connections except to blocked_domains.
    default_action: deny

    # Allow DNS resolution. Required for domain-based filtering.
    # Only set to false if you need a fully air-gapped sandbox.
    allow_dns: true

    # Maximum concurrent outbound connections from the container.
    # Prevents runaway HTTP clients from exhausting resources.
    max_connections: 50

    # Domains the agent can reach. Supports wildcard subdomains.
    allowed_domains:
      - "github.com"
      - "*.github.com"
      - "registry.npmjs.org"
      - "pypi.org"

    # Domains that are always blocked (takes priority over allowed_domains).
    blocked_domains: []

# ─────────────────────────────────────────────────────────────────────────────
# Secrets
# ─────────────────────────────────────────────────────────────────────────────
# Names of secrets to inject as environment variables into the sandbox.
# Secrets are stored in the sendbox vault (not in this file).
#
# To add a secret to the vault:
#   sendbox secret set NPM_TOKEN
#
# Secrets are injected at container start and are available as standard
# environment variables (e.g., $NPM_TOKEN). GitHub tokens are handled by
# the guarded GitHub auth forwarding configuration below. Secrets are never written
# to disk inside the container.
secrets:
  - NPM_TOKEN
  - DATABASE_URL

# ─────────────────────────────────────────────────────────────────────────────
# DevContainer Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Controls how the sandbox container is built and configured.
# SendBox uses the Dev Containers specification (https://containers.dev)
# to create reproducible development environments.
devcontainer:
  # Path to an existing devcontainer.json in your project.
  # If set, sendbox uses this instead of auto-generating one.
  # Relative to project_path.
  # Default: not set (auto-generate is used)
  # config_path: .devcontainer/devcontainer.json

  # When true, sendbox analyzes your project (package.json, Cargo.toml,
  # requirements.txt, etc.) and generates a devcontainer.json automatically.
  # Ignored if config_path is set.
  # Default: true
  auto_generate: true

  # Additional VS Code extensions to install in the container.
  # These are merged with any extensions from the devcontainer.json.
  # Use the fully qualified extension ID: publisher.extension-name
  extensions:
    - github.copilot
    - github.copilot-chat
    - ms-python.python
    - dbaeumer.vscode-eslint

# ─────────────────────────────────────────────────────────────────────────────
# GitHub Authentication
# ─────────────────────────────────────────────────────────────────────────────
# Controls how the sandbox authenticates with GitHub.
# Copilot authentication is forwarded independently. GitHub CLI credentials
# are forwarded when their private-repository scope contains only the selected
# repository, plus any explicitly approved same-organization repositories.
github:
  # Forward the host's `gh auth` token into the container.
  # The selected repository and public repositories are allowed by default.
  # Use a fine-grained token scoped to the selected repository when possible.
  # Default: true
  forward_auth: true

  # Forward Copilot CLI authentication into the container.
  # Required if the agent uses GitHub Copilot features.
  # Default: true
  forward_copilot_auth: true

  # Allow credentials that also cover additional private repositories.
  # Additional repositories must belong to the selected repository's
  # organization. Cross-organization private access is always denied.
  # Default: false
  allow_private_repository_access: false

  # Protect push and pull operations for the repository mounted at project_path.
  # Requires policy.boundaries.enabled so direct execution of the hidden git
  # binary is terminated by the eBPF boundary.
  branch_protection:
    # Default: true
    enabled: true

    # Username used to expand {username} in allowed_branch_patterns.
    # When omitted, SendBox resolves the active `gh` account automatically.
    # username: mbianchidev

    # These branches are always denied, even if an allowed pattern matches.
    protected_branches:
      - main
      - master

    # Selected-repository push destinations, pull sources, and current local
    # branches must match one of these glob patterns.
    allowed_branch_patterns:
      - "{username}/*"
      - "copilot/*"
      - "feature/*"

  # Path to an SSH private key to mount (read-only) into the container.
  # Use this if your project requires SSH-based git operations.
  # The key is mounted at ~/.ssh/ inside the container.
  # Default: not set (SSH auth disabled; use HTTPS via `gh auth`)
  # ssh_key_path: ~/.ssh/id_ed25519
