[package]
name = "sendbox-security-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4.13"
sendbox-secrets = { path = "../../crates/sendbox-secrets" }
sendbox-security = { path = "../../crates/sendbox-security" }
sendbox-session-security = { path = "../../crates/sendbox-session-security" }

