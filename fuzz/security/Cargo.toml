test = false
doc = false
bench = false

[[bin]]
name = "session_supervisor_decode"
path = "fuzz_targets/session_supervisor_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "session_migration_decode"
path = "fuzz_targets/session_migration_decode.rs"
test = false
doc = false
bench = false

[[bin]]
name = "secret_envelope_decode"
