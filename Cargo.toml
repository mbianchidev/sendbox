[workspace]
members = [
    "crates/sendbox-cli",
    "crates/sendbox-config",
    "crates/sendbox-core",
    "crates/sendbox-exec",
    "crates/sendbox-policy",
    "crates/sendbox-protocol",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.93.1"
license = "Apache-2.0"
repository = "https://github.com/mbianchidev/sendbox"

[workspace.dependencies]
clap = { version = "4.6.2", features = ["derive"] }
caps = "0.5.6"
getrandom = "0.4.3"
hkdf = "0.13.0"
hmac = { version = "0.13.0", features = ["zeroize"] }
libc = "0.2.186"
libseccomp = "0.4.0"
minicbor = { version = "2.2.2", features = ["std"] }
proptest = "1.11.0"
rlimit = "0.11.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml_ng = "0.10.0"
sha2 = "0.11.0"
tempfile = "3.27.0"
thiserror = "2.0.18"
tokio = { version = "1.53.0", features = ["io-util"] }
zeroize = "1.9.0"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = "deny"
