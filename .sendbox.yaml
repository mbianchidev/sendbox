name: undethroned-sanjuanita
project_path: .
resources:
  cpus: 4
  memory_mb: 4096
  disk_size_mb: 10240
policy:
  commands:
    default_action: deny
    allowlist:
    - git
    - npm
    - npx
    - yarn
    - pnpm
    - pip
    - pip3
    - python
    - python3
    - node
    - make
    - cmake
    - cargo
    - go
    - rustc
    - gcc
    - g++
    - curl
    - cat
    - ls
    - find
    - grep
    - sed
    - awk
    - head
    - tail
    - echo
    - env
    - which
    - whoami
    - mkdir
    - cp
    - mv
    - touch
    - rm
    - swift
    - swiftc
    - xcodebuild
    denylist: []
    log_blocked: true
  network:
    default_action: deny
    allowed_domains:
    - github.com
    - '*.github.com'
    - '*.githubusercontent.com'
    - registry.npmjs.org
    - pypi.org
    - '*.pypi.org'
    - rubygems.org
    - crates.io
    - proxy.golang.org
    - '*.docker.io'
    - '*.docker.com'
    blocked_domains: []
    allow_dns: true
secrets: []
devcontainer:
  auto_generate: true
  extensions: []
github:
  forward_auth: true
  forward_copilot_auth: true
