[package]
name = "apple-container-adapter-spike"
version = "0.1.0"
edition = "2024"
rust-version = "1.93.1"
publish = false
license = "MIT"

[workspace]

[dependencies]
async-trait = "0.1.89"
clap = { version = "4.6.2", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.53.0", features = ["io-util", "macros", "process", "rt-multi-thread", "time"] }
tokio-util = "0.7.18"

[dev-dependencies]
tempfile = "3.26.0"

[lints.rust]
unsafe_code = "forbid"
