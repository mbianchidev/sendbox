[package]
name = "sendbox-qualification"
version = "0.1.0"
edition = "2024"
rust-version = "1.93.1"
license = "Apache-2.0"
publish = false

[dependencies]
clap = { version = "4.6.2", features = ["derive"] }
sendbox-config = { path = "../../crates/sendbox-config" }
sendbox-core = { path = "../../crates/sendbox-core" }
sendbox-policy = { path = "../../crates/sendbox-policy" }
sendbox-protocol = { path = "../../crates/sendbox-protocol" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
tokio = { version = "1.53.0", features = ["io-util", "macros", "rt-multi-thread", "time"] }

[workspace]
members = ["."]
resolver = "3"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "deny"

