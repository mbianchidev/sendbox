name: kata-defaults
project_path: /tmp/sendbox-project
runtime:
  provider: kata
resources:
  cpus: 2
  memory_mb: 2048
  disk_size_mb: 5120
policy:
  commands:
    default_action: allow
    allowlist: []
    denylist: []
    log_blocked: true
  network:
    default_action: allow
    allowed_domains: []
    blocked_domains: []
    allow_dns: true
secrets: []
github:
  forward_auth: false
  forward_copilot_auth: false

