name: hyperlight-boundaries
project_path: /tmp/sendbox-project
runtime:
  provider: hyperlight
  hyperlight:
    executable: /usr/local/bin/hyperlight-unikraft
    kernel_path: /opt/hyperlight/shell-kernel
    initrd_path: /opt/hyperlight/shell.cpio
    stack_mb: 8
resources:
  cpus: 2
  memory_mb: 2048
  disk_size_mb: 5120
policy:
  commands:
    default_action: deny
    allowlist: []
    denylist: []
    log_blocked: true
  network:
    default_action: deny
    allowed_domains: [github.com]
    blocked_domains: []
    allow_dns: true
  boundaries:
    enabled: true
secrets: []
github:
  forward_auth: false
  forward_copilot_auth: false
  branch_protection:
    enabled: false
