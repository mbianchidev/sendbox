name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found, using default"
          else
            echo "Using $XCODE_PATH"
            sudo xcode-select -s "${XCODE_PATH}/Contents/Developer"
          fi

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Verify binary runs
        run: .build/release/sendbox --help

  linux-build-and-test:
    name: Linux Build & Test
    runs-on: ubuntu-latest
    container: swift:6.2@sha256:dd349c6dfc3cd3040910a84ab3e5bd5d08efdd547e5fb9f77b765abed16fe5ff
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.6"

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Verify binary runs
        run: .build/release/sendbox --help

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "${XCODE_PATH}/Contents/Developer"
          fi

      - name: Check formatting
        run: |
          if command -v swift-format &>/dev/null; then
            swift-format lint --recursive Sources/ Tests/ || true
          else
            echo "swift-format not available, skipping"
          fi

  copilot-bridge:
    name: Copilot Bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: copilot-bridge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Rust version
        run: rustc --version --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-features

      - name: Build (debug)
        run: cargo build --workspace

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Verify experimental CLI
        run: |
          ./target/release/sendbox-rs --version
          ./target/release/sendbox-rs policy validate --config config/example-sandbox.yaml
          ./target/release/sendbox-rs policy validate --config config/example-sandbox.yaml --json

  rust-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit dependencies
        run: cargo audit
